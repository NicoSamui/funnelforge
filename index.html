<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FunnelForge — Funnel Builder</title>
<style>
:root{
  --bg:#0f1115; --panel:#171a21; --panel2:#1e222b; --border:#2a2f3a;
  --txt:#e7e9ee; --muted:#9aa3b2; --accent:#4f7cff; --accent2:#7c5cff;
  --good:#2fbf71; --warn:#f5a623; --bad:#ef4565; --radius:12px;
}
*{box-sizing:border-box}
html,body{margin:0;height:100%}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  background:var(--bg);color:var(--txt);font-size:14px;line-height:1.45}
button{font-family:inherit;cursor:pointer}
input,select,textarea{font-family:inherit}
a{color:var(--accent)}
.hidden{display:none!important}
.app{display:flex;height:100vh;overflow:hidden}
/* Sidebar */
.side{width:230px;background:var(--panel);border-right:1px solid var(--border);
  display:flex;flex-direction:column;flex-shrink:0}
.brand{padding:18px 18px 12px;font-weight:700;font-size:18px;display:flex;align-items:center;gap:8px}
.brand .dot{width:12px;height:12px;border-radius:4px;background:linear-gradient(135deg,var(--accent),var(--accent2))}
.brand small{display:block;font-weight:400;font-size:11px;color:var(--muted);margin-top:2px}
.nav{padding:8px;display:flex;flex-direction:column;gap:2px}
.nav button{display:flex;align-items:center;gap:10px;width:100%;text-align:left;border:none;
  background:transparent;color:var(--muted);padding:10px 12px;border-radius:8px;font-size:14px}
.nav button:hover{background:var(--panel2);color:var(--txt)}
.nav button.active{background:var(--panel2);color:var(--txt);box-shadow:inset 3px 0 0 var(--accent)}
.nav .ico{width:18px;text-align:center}
.side .foot{margin-top:auto;padding:14px;border-top:1px solid var(--border);color:var(--muted);font-size:12px}
/* Main */
.main{flex:1;overflow:auto;display:flex;flex-direction:column}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:14px 22px;
  border-bottom:1px solid var(--border);background:var(--panel);position:sticky;top:0;z-index:20}
.topbar h1{font-size:18px;margin:0}
.content{padding:22px;max-width:1180px;width:100%;margin:0 auto}
/* Buttons */
.btn{background:var(--panel2);border:1px solid var(--border);color:var(--txt);padding:9px 14px;border-radius:9px;font-size:13px;display:inline-flex;align-items:center;gap:7px}
.btn:hover{border-color:#3a4150}
.btn.primary{background:linear-gradient(135deg,var(--accent),var(--accent2));border:none;color:#fff;font-weight:600}
.btn.ghost{background:transparent}
.btn.danger{color:var(--bad);border-color:#3a2030}
.btn.sm{padding:6px 10px;font-size:12px}
.btn:disabled{opacity:.5;cursor:not-allowed}
/* Cards / grid */
.grid{display:grid;gap:16px}
.cards{grid-template-columns:repeat(auto-fill,minmax(230px,1fr))}
.card{background:var(--panel);border:1px solid var(--border);border-radius:var(--radius);padding:16px}
.choose-card{transition:border-color .15s ease,transform .15s ease}
.choose-card:hover{border-color:var(--accent);transform:translateY(-2px)}
.kpi{display:flex;flex-direction:column;gap:6px}
.kpi .label{color:var(--muted);font-size:12px;text-transform:uppercase;letter-spacing:.04em}
.kpi .val{font-size:28px;font-weight:700}
.kpi .sub{font-size:12px;color:var(--muted)}
.section-title{font-size:13px;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);margin:26px 0 10px}
/* Table */
table{width:100%;border-collapse:collapse;font-size:13px}
th,td{text-align:left;padding:10px 12px;border-bottom:1px solid var(--border)}
th{color:var(--muted);font-weight:600;font-size:12px;text-transform:uppercase;letter-spacing:.03em}
tr:hover td{background:var(--panel2)}
.badge{display:inline-block;padding:3px 9px;border-radius:99px;font-size:11px;font-weight:600}
.badge.green{background:rgba(47,191,113,.15);color:var(--good)}
.badge.gray{background:rgba(154,163,178,.15);color:var(--muted)}
.badge.warn{background:rgba(245,166,35,.15);color:var(--warn)}
/* Funnel list */
.funnel-card{display:flex;flex-direction:column;gap:10px;cursor:default}
.funnel-card .meta{color:var(--muted);font-size:12px}
.funnel-card .row{display:flex;gap:8px;flex-wrap:wrap;margin-top:6px}
.mini-stats{display:flex;gap:14px;margin-top:4px}
.mini-stats div{font-size:12px;color:var(--muted)}
.mini-stats b{color:var(--txt);font-size:15px;display:block}
/* Forms */
.field{margin-bottom:14px}
.field label{display:block;font-size:12px;color:var(--muted);margin-bottom:6px}
.field input,.field select,.field textarea{width:100%;background:var(--panel2);border:1px solid var(--border);
  color:var(--txt);padding:10px 12px;border-radius:9px;font-size:13px}
.field textarea{min-height:70px;resize:vertical}
.field .hint{font-size:11px;color:var(--muted);margin-top:5px}
.inline{display:flex;gap:10px;align-items:center}
.switch{display:inline-flex;align-items:center;gap:8px;cursor:pointer}
/* Modal */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);display:flex;align-items:center;justify-content:center;z-index:100;padding:20px}
.modal{background:var(--panel);border:1px solid var(--border);border-radius:14px;max-width:520px;width:100%;padding:22px;max-height:88vh;overflow:auto}
.modal h3{margin:0 0 14px}
.modal .actions{display:flex;justify-content:flex-end;gap:10px;margin-top:18px}
/* ===== Builder ===== */
.builder{display:grid;grid-template-columns:230px 1fr 290px;height:calc(100vh - 57px)}
.bcol{overflow:auto;border-right:1px solid var(--border)}
.bcol:last-child{border-right:none;border-left:1px solid var(--border)}
.bcol h4{font-size:12px;text-transform:uppercase;letter-spacing:.04em;color:var(--muted);padding:14px 14px 8px;margin:0}
.steps-list{padding:6px 10px}
.step-item{background:var(--panel2);border:1px solid var(--border);border-radius:9px;padding:10px;margin-bottom:8px;cursor:pointer}
.step-item.active{border-color:var(--accent)}
.step-item .si-top{display:flex;justify-content:space-between;align-items:center;gap:6px}
.step-item .si-name{font-weight:600;font-size:13px}
.step-item .si-meta{font-size:11px;color:var(--muted);margin-top:3px}
.step-item .si-actions{display:flex;gap:4px}
.icon-btn{background:transparent;border:none;color:var(--muted);padding:2px 5px;border-radius:6px;font-size:13px}
.icon-btn:hover{background:var(--border);color:var(--txt)}
.canvas-wrap{display:flex;flex-direction:column;align-items:center;padding:22px;background:#0b0d11;overflow:auto}
.phone{width:390px;max-width:100%;background:#fff;color:#15181f;border-radius:30px;min-height:560px;
  box-shadow:0 18px 64px rgba(0,0,0,.5);overflow:hidden;border:9px solid #04060a}
.phone-inner{padding:26px 22px 40px;min-height:540px;color:#1a1f29;-webkit-font-smoothing:antialiased;font-size:16px;line-height:1.5}
.drop-zone{min-height:80px}
.pb-block{position:relative;border:1px dashed transparent;border-radius:8px;padding:6px;margin:2px 0;cursor:grab}
.pb-block:hover{border-color:#c7d0e0;background:#f5f7fb}
.pb-block.sel{border:1px solid var(--accent);background:#eef2ff}
.pb-block .bgrip{position:absolute;top:4px;right:6px;font-size:10px;color:#9aa3b2;background:#fff;border-radius:5px;padding:1px 5px;border:1px solid #e2e6ee;opacity:0;display:flex;gap:4px}
.pb-block:hover .bgrip{opacity:1}
.pb-block .bgrip button{border:none;background:transparent;cursor:pointer;font-size:11px;color:#5a6478}
.empty-canvas{color:#9aa3b2;text-align:center;padding:40px 10px;border:2px dashed #d6dce8;border-radius:12px}
.palette{padding:8px 10px;display:grid;grid-template-columns:1fr 1fr;gap:7px}
.pal-item{background:var(--panel2);border:1px solid var(--border);border-radius:8px;padding:10px 8px;text-align:center;font-size:12px;cursor:grab;user-select:none}
.pal-item:hover{border-color:var(--accent)}
.pal-item .pi{font-size:17px;display:block;margin-bottom:3px}
.props{padding:12px 14px}
.props .field{margin-bottom:11px}
.opt-row{display:flex;gap:6px;align-items:center;margin-bottom:6px}
.opt-row input{flex:1}
.opt-row select{width:120px}
/* rendered preview elements (inside phone & player) */
.r-headline{font-weight:800;line-height:1.16;letter-spacing:-.02em;margin:14px 0 8px;color:#10131a}
.r-text{margin:8px 0 14px;color:#4a5365;line-height:1.62;font-size:15.5px}
.r-img{width:100%;border-radius:16px;margin:12px 0;display:block;object-fit:cover}
.r-btn{display:block;width:100%;text-align:center;padding:16px 18px;border-radius:14px;border:none;
  color:#fff;font-weight:700;font-size:16px;margin:14px 0;cursor:pointer;letter-spacing:.01em;
  box-shadow:0 8px 22px rgba(0,0,0,.14);transition:transform .12s,box-shadow .12s}
.r-btn:hover{transform:translateY(-1px);box-shadow:0 12px 28px rgba(0,0,0,.2)}
.r-btn:active{transform:translateY(0)}
.r-choice{border:2px solid #e6eaf2;border-radius:14px;padding:15px 16px;margin:10px 0;cursor:pointer;font-weight:600;font-size:15.5px;transition:.15s;background:#fff;color:#1a1f29;box-shadow:0 1px 3px rgba(16,19,26,.05)}
.r-choice:hover{border-color:var(--accent);background:#f3f6ff;transform:translateY(-1px)}
.r-choice.picked{border-color:var(--accent);background:#eef2ff}
.r-choice.exp{background:#2f3340;color:#fff;border:2px solid transparent;text-align:left;font-weight:600;box-shadow:0 4px 14px rgba(0,0,0,.12)}
.r-choice.exp:hover{background:#262a35;border-color:transparent;transform:translateY(-1px)}
.r-choice.exp.picked{border-color:#fff;filter:brightness(1.1)}
.r-qbar{color:#fff;font-weight:700;text-align:center;padding:14px;margin:-26px -22px 22px;font-size:15px;letter-spacing:.02em}
.r-kicker{text-align:center;font-size:12px;font-weight:700;letter-spacing:.12em;color:#8a94a6;text-transform:uppercase;margin:22px 0 4px}
.r-quote{font-style:italic;color:#3a4250;border-left:3px solid #e2e6ee;padding-left:12px;margin:10px 0}
.r-compare{border:1px solid #e2e6ee;border-radius:12px;padding:14px;margin:10px 0}
.r-q{font-weight:800;font-size:20px;line-height:1.25;letter-spacing:-.01em;margin:6px 0 16px;color:#10131a;text-align:center}
.r-field{margin-bottom:12px}
.r-field label{display:block;font-size:12.5px;color:#5a6478;margin-bottom:5px;font-weight:600}
.r-field input,.r-field select,.r-field textarea{width:100%;padding:14px;border:1.5px solid #dde3ec;border-radius:12px;font-size:16px;color:#15181f;background:#fff;transition:border-color .15s}
.r-field input:focus,.r-field select:focus,.r-field textarea:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px rgba(79,124,255,.12)}
.r-timer{text-align:center;font-weight:800;font-size:27px;letter-spacing:.03em;margin:12px 0;color:#10131a;font-variant-numeric:tabular-nums}
.r-progress{height:7px;background:#eef1f6;border-radius:99px;overflow:hidden;margin:-8px -2px 20px}
.r-progress > div{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));transition:width .3s}
/* Player full */
.player-overlay{position:fixed;inset:0;background:#0b0d11;z-index:200;display:flex;flex-direction:column}
.player-bar{display:flex;justify-content:space-between;align-items:center;padding:12px 18px;border-bottom:1px solid var(--border)}
.player-stage{flex:1;display:flex;align-items:center;justify-content:center;overflow:auto;padding:24px;background:radial-gradient(1100px 560px at 50% -8%, #1b2233 0%, #0b0d11 62%)}
.r-field.err input,.r-field.err select,.r-field.err textarea{border-color:#ef4565!important;box-shadow:0 0 0 3px rgba(239,69,101,.13)}
.r-field.err label{color:#ef4565}
.r-consent.err{color:#ef4565}.r-consent.err input{outline:2px solid #ef4565}
.mobile-note{display:none;background:rgba(79,124,255,.1);border:1px solid rgba(79,124,255,.3);color:#b9c6ff;border-radius:10px;padding:11px 13px;font-size:12.5px;margin-bottom:14px;max-width:390px}
/* charts */
.chart{width:100%;overflow:visible}
.bar-row{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.bar-row .bl{width:130px;font-size:12px;color:var(--muted);flex-shrink:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.bar-track{flex:1;background:var(--panel2);border-radius:6px;height:26px;position:relative;overflow:hidden}
.bar-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:6px;display:flex;align-items:center;padding-left:8px;font-size:11px;color:#fff;font-weight:600;min-width:2px}
.bar-row .bv{width:120px;font-size:12px;color:var(--muted);text-align:right;flex-shrink:0}
.tabs{display:flex;gap:6px;margin-bottom:16px;flex-wrap:wrap}
.tabs .t{padding:7px 13px;border-radius:8px;border:1px solid var(--border);background:var(--panel);color:var(--muted);font-size:13px}
.tabs .t.active{background:var(--panel2);color:var(--txt);border-color:var(--accent)}
.flex{display:flex}.between{justify-content:space-between}.center{align-items:center}.gap{gap:10px}.wrap{flex-wrap:wrap}
.muted{color:var(--muted)}
.notice{background:rgba(79,124,255,.08);border:1px solid rgba(79,124,255,.3);border-radius:10px;padding:12px 14px;font-size:12.5px;color:#b9c6ff;margin-bottom:16px}
.toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);background:#15181f;border:1px solid var(--border);color:var(--txt);padding:12px 18px;border-radius:10px;z-index:300;box-shadow:0 8px 30px rgba(0,0,0,.5);font-size:13px}
code.dns{display:block;background:#0b0d11;border:1px solid var(--border);border-radius:8px;padding:8px 10px;font-family:ui-monospace,Menlo,monospace;font-size:12px;margin:4px 0;color:#b9c6ff;word-break:break-all}
.split{display:grid;grid-template-columns:1fr 1fr;gap:16px}
/* new blocks */
.r-list{list-style:none;padding:0;margin:12px 0}
.r-list li{padding:9px 0 9px 32px;position:relative;color:#39414f;font-size:15px;line-height:1.5;border-bottom:1px solid #f0f2f7}
.r-list li:last-child{border-bottom:none}
.r-list li:before{content:"✓";position:absolute;left:0;top:8px;width:20px;height:20px;line-height:20px;text-align:center;border-radius:50%;background:rgba(47,191,113,.14);color:#2fbf71;font-weight:800;font-size:12px}
.r-feature{display:flex;gap:13px;align-items:flex-start;background:#f7f9fc;border:1px solid #eef1f6;border-radius:16px;padding:15px 16px;margin:10px 0}
.r-feature .fi{font-size:24px;line-height:1.1;flex:0 0 auto;width:36px;height:36px;text-align:center;border-radius:10px;background:#fff;border:1px solid #eef1f6}
.r-feature .ft{font-weight:700;font-size:15.5px;color:#10131a;margin-bottom:3px}
.r-feature .fd{font-size:13.5px;color:#5a6478;line-height:1.5}
.r-faq{border:1px solid #e2e6ee;border-radius:10px;margin:8px 0;overflow:hidden}
.r-faq summary{padding:13px 14px;cursor:pointer;font-weight:600;color:#15181f;list-style:none}
.r-faq summary::-webkit-details-marker{display:none}
.r-faq summary:after{content:"+";float:right;color:#9aa3b2;font-weight:700}
.r-faq[open] summary:after{content:"–"}
.r-faq .fa{padding:0 14px 13px;color:#3a4250;font-size:13px}
.r-tslide{display:flex;gap:12px;overflow-x:auto;padding:6px 2px 14px;scroll-snap-type:x mandatory;-webkit-overflow-scrolling:touch}
.r-tcard{flex:0 0 86%;scroll-snap-align:center;background:#fff;border:1px solid #eef1f6;border-radius:16px;padding:16px 17px;box-shadow:0 6px 20px rgba(16,19,26,.06)}
.r-tcard .tt{color:#39414f;line-height:1.55;font-size:14.5px}
.r-tcard .tt:before{content:"“";font-size:30px;color:#cdd6e6;line-height:0;vertical-align:-8px;margin-right:2px}
.r-tcard .tn{margin-top:12px;font-weight:700;font-size:13px;color:#10131a}
.r-tcard .tn:before{content:"";display:inline-block;width:22px;height:2px;background:var(--accent);vertical-align:middle;margin-right:7px;border-radius:2px}
.r-embed{width:100%;border:0;border-radius:10px;margin:8px 0;min-height:120px}
.r-consent{display:flex;align-items:flex-start;gap:8px;font-size:12.5px;color:#3a4250;margin:8px 0}
.r-consent input{margin-top:3px}
.cc-wrap{display:flex;gap:6px}
.cc-wrap select{width:108px;flex:0 0 auto}
/* step animation */
@keyframes stepIn{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}
.step-anim{animation:stepIn .32s ease}
/* confetti */
#confetti{position:fixed;inset:0;pointer-events:none;z-index:400;overflow:hidden}
.confetti-piece{position:absolute;width:9px;height:14px;opacity:.9;will-change:transform}
@keyframes confFall{to{transform:translateY(105vh) rotate(720deg);opacity:1}}
/* kanban */
.kanban{display:flex;gap:12px;overflow-x:auto;padding-bottom:8px}
.kan-col{flex:0 0 240px;background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:10px}
.kan-col h4{margin:2px 0 10px;font-size:12px;text-transform:uppercase;letter-spacing:.04em;color:var(--muted);display:flex;justify-content:space-between}
.kan-card{background:var(--panel2);border:1px solid var(--border);border-radius:9px;padding:10px;margin-bottom:8px}
.kan-card .kn{font-weight:600;font-size:13px}
.kan-card .ke{font-size:11px;color:var(--muted);margin:3px 0 6px;word-break:break-all}
.kan-card select{width:100%;background:var(--bg);border:1px solid var(--border);color:var(--txt);border-radius:7px;padding:5px;font-size:11px}
.hbar{display:flex;align-items:flex-end;gap:4px;height:120px}
.hbar .hb{flex:1;background:linear-gradient(180deg,#7c5cff,#4f7cff);border-radius:3px 3px 0 0;min-height:2px}
.hbar .hl{font-size:8px;color:var(--muted);text-align:center;margin-top:3px}
/* Hero / badges / kicker — premium funnel design */
.r-hero{margin:-26px -22px 24px;padding:40px 24px 34px;text-align:center;color:#fff;position:relative;overflow:hidden}
.r-hero:after{content:"";position:absolute;right:-70px;top:-70px;width:220px;height:220px;border-radius:50%;background:rgba(255,255,255,.10)}
.r-hero:before{content:"";position:absolute;left:-60px;bottom:-80px;width:200px;height:200px;border-radius:50%;background:rgba(255,255,255,.07)}
.r-hero-img{position:absolute;inset:0;background-size:cover;background-position:center;opacity:.22}
.r-hero .hb{position:relative;display:inline-block;background:rgba(255,255,255,.16);border:1px solid rgba(255,255,255,.3);color:#fff;font-size:11px;font-weight:700;letter-spacing:.09em;text-transform:uppercase;padding:6px 13px;border-radius:99px;margin-bottom:16px}
.r-hero h2{position:relative;font-size:30px;line-height:1.12;letter-spacing:-.022em;margin:0 0 12px;font-weight:800;color:#fff}
.r-hero p{position:relative;font-size:15.5px;line-height:1.55;color:rgba(255,255,255,.93);margin:0 auto 20px;max-width:33ch}
.r-hero .r-btn{position:relative;background:#fff !important;color:#15181f;margin:0;box-shadow:0 10px 26px rgba(0,0,0,.22)}
.r-badges{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin:16px 0}
.r-badges span{background:#f2f5fa;border:1px solid #e6eaf2;border-radius:99px;padding:7px 13px;font-size:12.5px;font-weight:600;color:#3a4250}
.r-kicker2{text-align:center;font-size:12px;font-weight:800;letter-spacing:.14em;text-transform:uppercase;margin:26px 0 8px}
.r-kicker2:after{content:"";display:block;width:32px;height:3px;border-radius:2px;background:currentColor;margin:9px auto 0;opacity:.55}
/* Mobile: render the funnel full-bleed (no phone mockup) */
@media(max-width:480px){
  .r-hero{margin:-24px -20px 22px}
  .player-stage{padding:0;align-items:stretch;justify-content:stretch}
  .player-stage .phone{width:100%;max-width:100%;border:0;border-radius:0;min-height:100%;box-shadow:none}
  .player-stage .phone-inner{min-height:calc(100vh - 52px);padding:24px 20px 64px}
  .player-stage .r-qbar{margin:-24px -20px 22px}
  .player-bar{padding:10px 14px}
  .r-headline{font-size:25px!important}
  .r-q{font-size:19px}
}
@media(max-width:760px){
  .builder{grid-template-columns:1fr}
  .bcol{display:none}
  .bcol.canvas-wrap{display:flex}
  .mobile-note{display:block}
  .split{grid-template-columns:1fr}
}
</style>
</head>
<body>
<div id="root" class="app"></div>
<div id="modal-root"></div>
<div id="player-root"></div>
<div id="toast-root"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
"use strict";
/* ============================================================
   FunnelForge — Perspective-Style Funnel Builder (Single File)
   ============================================================ */

async function supaLoad(){

/* Smart personalization: replace {{key}} with UTM/query params or submitted form fields */
function personalize(s){
  if(!s || String(s).indexOf("{{")<0) return s;
  const map=Object.assign({}, PLAYER.utm||{}, PLAYER.fields||{});
  return String(s).replace(/\{\{\s*([\w.]+)\s*\}\}/g,(m,k)=>{ const v=map[k]; return (v!=null&&v!=="")?v:""; });
}
function confetti(){
  if(document.getElementById("confetti")) return;
  const c=document.createElement("div"); c.id="confetti"; document.body.appendChild(c);
  const colors=["#4f7cff","#7c5cff","#2fbf71","#f5a623","#ef4565"];
  for(let i=0;i<90;i++){ const p=document.createElement("div"); p.className="confetti-piece";
    p.style.left=(Math.random()*100)+"vw"; p.style.top=(-10-Math.random()*20)+"vh";
    p.style.background=colors[i%colors.length];
    p.style.animation="confFall "+(2+Math.random()*1.6)+"s "+(Math.random()*0.5)+"s ease-in forwards";
    p.style.transform="rotate("+(Math.random()*360)+"deg)"; c.appendChild(p); }
  setTimeout(()=>{ const e=document.getElementById("confetti"); if(e) e.remove(); }, 4500);
}
function downloadICS(title,startISO,durationMin){
  const dt=new Date(startISO); if(isNaN(dt.getTime())){ toast("Kein gültiges Webinar-Datum hinterlegt"); return; }
  const pad=n=>String(n).padStart(2,"0");
  const fmt=d=>d.getUTCFullYear()+pad(d.getUTCMonth()+1)+pad(d.getUTCDate())+"T"+pad(d.getUTCHours())+pad(d.getUTCMinutes())+"00Z";
  const end=new Date(dt.getTime()+(durationMin||60)*60000);
  const ics=["BEGIN:VCALENDAR","VERSION:2.0","PRODID:-//FunnelForge//DE","BEGIN:VEVENT","UID:"+uid("ics")+"@funnelforge",
    "DTSTAMP:"+fmt(new Date()),"DTSTART:"+fmt(dt),"DTEND:"+fmt(end),"SUMMARY:"+title,"END:VEVENT","END:VCALENDAR"].join("\r\n");
  const blob=new Blob([ics],{type:"text/calendar;charset=utf-8"}); const a=document.createElement("a");
  a.href=URL.createObjectURL(blob); a.download="termin.ics"; a.click();
}
function detectDevice(){ return /Mobi|Android|iPhone|iPad/i.test(navigator.userAgent||"")?"mobile":"desktop"; }
/* reject javascript:/data: and other unsafe schemes for links/iframes */
function safeUrl(u){ u=String(u||"").trim(); if(!u) return "";
  if(/^(https?:|mailto:|tel:)/i.test(u)) return u;
  if(/^\/\//.test(u)) return "https:"+u;
  if(/^[\w.-]+\.[a-z]{2,}([\/?#]|$)/i.test(u)) return "https://"+u;
  return ""; }
function recomputeScore(){ PLAYER.score=Object.keys(PLAYER.points||{}).reduce((a,k)=>a+(PLAYER.points[k]||0),0); }
function brandGradient(c){ c=c||"#4f7cff"; return "linear-gradient(135deg,"+shade(c,0.20)+" 0%,"+shade(c,-0.22)+" 100%)"; }
function hexToRgba(hex,a){ hex=String(hex||"#4f7cff").replace("#",""); if(hex.length===3) hex=hex.split("").map(c=>c+c).join("");
  const r=parseInt(hex.substr(0,2),16)||0,g=parseInt(hex.substr(2,2),16)||0,b=parseInt(hex.substr(4,2),16)||0; return "rgba("+r+","+g+","+b+","+a+")"; }
function heroHTML(bl,f,p){ p=p||(x=>x); const c=f.settings.primaryColor||"#4f7cff";
  const img=bl.image?('<div class="r-hero-img" style="background-image:url(\''+esc(safeUrl(bl.image)||"")+'\')"></div>'):"";
  return '<div class="r-hero" style="background:'+brandGradient(c)+'">'+img
    +(bl.badge?'<span class="hb">'+esc(p(bl.badge))+'</span>':'')
    +'<h2>'+esc(p(bl.headline))+'</h2>'
    +(bl.text?'<p>'+esc(p(bl.text))+'</p>':'')
    +(bl.cta?'<button class="r-btn play-btn">'+esc(p(bl.cta))+'</button>':'')
    +'</div>'; }
function ctaBg(f){ return (f.settings&&f.settings.ctaColor)? f.settings.ctaColor : brandGradient(f.settings&&f.settings.primaryColor); }

   ============================================================ */
function lockScreen(){
  return '<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px">'
    +'<div class="card" style="max-width:440px;text-align:center;padding:40px 28px">'
    +'<div style="font-size:40px;margin-bottom:8px">🔒</div>'
    +'<h2 style="margin:0 0 8px">Anmeldung erforderlich</h2>'
    +'<p class="muted" style="line-height:1.6;font-size:14px">Diese App öffnet sich nur über deinen Mitgliederbereich in <b>LearningSuite</b>. Starte FunnelForge bitte dort über deinen Kurs – dann wirst du automatisch erkannt und dein persönlicher Bereich wird geladen.</p>'
    +'<p class="muted" style="font-size:12px;margin-top:14px">Kein gültiger Zugang erkannt (fehlende Nutzer-ID).</p>'
    +'</div></div>';
}
function render(){
  const root=document.getElementById("root");
  if(!USER_ID){ root.innerHTML=lockScreen(); return; }
  if(UI.view==="builder"){ const _bf=getFunnel(UI.funnelId);
    if(_bf&&_bf.type==="html"){ root.innerHTML=sidebar()+'<div class="main">'+renderHtmlBuilder(_bf)+'</div>'; bindNav(); bindHtmlBuilder(_bf); return; }
    root.innerHTML=sidebar()+'<div class="main">'+renderBuilder()+'</div>'; bindBuilder(); bindNav(); return; }
  let body="";
  switch(UI.view){
    case "dashboard": body=renderDashboard(); break;
    case "funnels":   body=renderFunnels(); break;
    case "leads":     body=renderLeads(); break;
    case "analytics": body=renderAnalytics(); break;
    case "domains":   body=renderDomains(); break;
    case "help":      body=renderHelp(); break;
    default:          body=renderDashboard();
  }
  root.innerHTML = sidebar() + '<div class="main">'+body+'</div>';
  bindNav();
  if(UI.view==="leads") bindLeads();
  if(UI.view==="analytics") bindAnalytics();
  if(UI.view==="funnels") bindFunnels();
  if(UI.view==="domains") bindDomains();
}

function sidebar(){
  const items=[
    ["dashboard","▦","Dashboard"],
    ["funnels","⛢","Funnels"],
    ["leads","☰","Leads / CRM"],
    ["analytics","📈","Analytics"],
    ["domains","🌐","Domains"],
    ["help","?","Hilfe & Setup"]
  ];
  return '<div class="side"><div class="brand"><span class="dot"></span><div>FunnelForge'
    +'<small>Funnel Builder · Prototyp</small></div></div><div class="nav">'
    + items.map(i=>'<button data-nav="'+i[0]+'" class="'+(UI.view===i[0]?"active":"")+'">'
        +'<span class="ico">'+i[1]+'</span>'+i[2]+'</button>').join("")
    + '</div><div class="foot">Daten liegen lokal in deinem Browser.<br>v1.0 · '+DB.funnels.length+' Funnels</div></div>';
}
function bindNav(){
  document.querySelectorAll("[data-nav]").forEach(b=>{
    b.onclick=()=>{ UI.view=b.getAttribute("data-nav"); window.scrollTo(0,0); render(); };
  });
}

/* ============================================================
   DASHBOARD
   ============================================================ */
function rangeStart(range){
  const d=new Date(); d.setHours(0,0,0,0);
  if(range==="today") return d.getTime();
  if(range==="7d") return d.getTime()-6*864e5;
  if(range==="30d") return d.getTime()-29*864e5;
  return 0;
}
function eventsFor(funnelId, range){
  const start=rangeStart(range||"all");
  return DB.events.filter(e=>(!funnelId||e.funnelId===funnelId) && e.ts>=start);
}
function funnelStats(funnelId, range){
  const ev=eventsFor(funnelId,range);
  const starts=ev.filter(e=>e.type==="start").length;
  const leads=ev.filter(e=>e.type==="lead").length;
  const completes=ev.filter(e=>e.type==="complete").length;
  const clicks=ev.filter(e=>e.type==="click").length;
  const views=ev.filter(e=>e.type==="view").length;
  const uniq=new Set(ev.map(e=>e.visitor)).size;
  return { starts, leads, completes, clicks, views, uniq,
    cr: starts? leads/starts:0, ctr: views? clicks/views:0 };
}

function buildWebinarFunnel(o){
  const f=newFunnel(o.title||"Webinar");
  f.settings.primaryColor=o.color||"#4f7cff"; f.settings.confetti=true;
  f.meta={type:"webinar",webinarTitle:o.title||"Webinar",webinarDate:o.date||""};
  const H=(t,s,a)=>{const b=BLOCK_DEFS.headline.make();b.text=t;if(s)b.size=s;b.align=a||"left";return b;};
  const T=(t,a)=>{const b=BLOCK_DEFS.text.make();b.text=t;b.align=a||"left";return b;};
  const FEAT=(icon,title,text)=>{const b=BLOCK_DEFS.feature.make();b.icon=icon;b.title=title;b.text=text;return b;};
  const KICK=(t)=>{const b=BLOCK_DEFS.headline.make();b.text=t;b.size=13;b.align="center";return b;};
  const land=newStep("Anmeldung",[]);
  land.blocks.push(KICK("KOSTENLOSES LIVE-WEBINAR"));

  land.blocks.push(T(o.subtitle||"Sichere dir jetzt deinen Platz und sei live dabei.","center"));
  if(o.date){ const tm=BLOCK_DEFS.timer.make(); tm.mode="date"; tm.endDate=o.date; tm.label="Webinar startet in"; land.blocks.push(tm); }
  if(o.video){ const v=BLOCK_DEFS.video.make(); v.url=o.video; land.blocks.push(v); }
  const cta1=BLOCK_DEFS.button.make(); cta1.label="Jetzt kostenlos anmelden"; cta1.variant="cta"; land.blocks.push(cta1);
  land.blocks.push({type:"spacer",height:12});
  land.blocks.push(H("Das nimmst du mit",22,"center"));
  land.blocks.push(FEAT("🎯","Konkrete Strategien","Sofort umsetzbare Schritte, die du direkt anwenden kannst."));
  land.blocks.push(FEAT("💬","Live-Q&A","Stelle "+(o.presenter||"dem Speaker")+" live deine Fragen."));
  land.blocks.push(FEAT("🎁","Exklusive Vorlagen","Kostenlose Materialien nur für Teilnehmer."));
  const cta=BLOCK_DEFS.button.make(); cta.label="Platz jetzt sichern"; cta.variant="cta"; land.blocks.push(cta);
  const reg=newStep("Kontakt",[]);
  reg.blocks.push(H("Fast geschafft – melde dich an",22,"center"));
  const fr=BLOCK_DEFS.form.make(); fr.submitLabel="Platz sichern";
  fr.fields=[{key:"vorname",label:"Vorname",type:"text",required:true},{key:"email",label:"E-Mail",type:"email",required:true}];
  reg.blocks.push(fr);
  const conf=newStep("Bestätigt",[]); conf.logic.defaultNext="end";
  conf.blocks.push(H("Du bist angemeldet, {{vorname}}! 🎉",24,"center"));
  conf.blocks.push(T("Wir sehen uns im Webinar"+(o.date?(" am "+String(o.date).replace("T"," um ")):"")+". Trag dir den Termin direkt in deinen Kalender ein:","center"));
  const ics=BLOCK_DEFS.button.make(); ics.label="📅 Zum Kalender hinzufügen"; ics.action="ics"; conf.blocks.push(ics);
  f.steps=[land,reg,conf];
  return f;
}

/* ---- Claude-Zugang ----------------------------------------------------------
   Standard: sicherer Netlify-Proxy (/.netlify/functions/ai) — Nicos Key liegt in
   Netlify, Kunden brauchen KEINEN eigenen Key. Hat ein Kunde (fortgeschritten)
   doch einen eigenen Anthropic-Key hinterlegt, wird der direkt genutzt.
   Gibt das rohe Anthropic-Antwortobjekt zurück. */
const AI_PROXY_URL = "/.netlify/functions/ai";
async function anthropicJSON(body){
  const cfg=DB.aiConfig||{};
  if(cfg.provider==="anthropic" && cfg.apiKey){
    const res=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"content-type":"application/json","x-api-key":cfg.apiKey,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},body:JSON.stringify(body)});
    if(!res.ok) throw new Error("KI "+res.status);
    return res.json();
  }
  let res;
  try{ res=await fetch(AI_PROXY_URL,{method:"POST",headers:{"content-type":"application/json"},body:JSON.stringify(body)}); }
  catch(e){ throw new Error("KI-Proxy nicht erreichbar – läuft die App schon live auf Netlify?"); }
  if(!res.ok){
    if(res.status===429) throw new Error("Zu viele KI-Anfragen gerade – bitte kurz warten.");
    if(res.status===404) throw new Error("KI-Proxy nicht gefunden – erst auf Netlify deployen (oder eigenen Key hinterlegen).");
    throw new Error("KI nicht erreichbar ("+res.status+")");
  }
  return res.json();
}
function aiTextFromResp(d){ return ((d&&d.content&&d.content[0]&&d.content[0].text)||"").trim(); }
async function aiText(prompt){
  const d=await anthropicJSON({model:"claude-haiku-4-5-20251001",max_tokens:500,messages:[{role:"user",content:prompt}]});
  return aiTextFromResp(d);
}
async function blockAI(bl,instruction){
  const cur=bl.text||""; if(!cur){ toast("Kein Text vorhanden"); return; }
  toast("KI arbeitet…");
  try{ const out=await aiText(instruction+cur); if(out){ bl.text=out; saveDB(); render(); toast("KI fertig ✓"); } }
  catch(e){ toast(e.message||"KI nicht erreichbar"); }
}
function stepTargetSelectInline(f,curStep,val,optIndex){
  let o='<option value="next"'+(val==="next"?" selected":"")+'>weiter</option>';

  f.steps.forEach((s,i)=>{ if(s.id!==curStep.id) o+='<option value="'+s.id+'"'+(val===s.id?" selected":"")+'>→'+(i+1)+'</option>'; });
  return '<select data-optnext="'+optIndex+'" style="width:78px">'+o+'</select>';
}

  const bs=document.getElementById("b-settings"); if(bs) bs.onclick=()=>openFunnelSettings(f.id);
  const bex=document.getElementById("b-export"); if(bex) bex.onclick=()=>exportFunnel(f.id);
  const bsa=document.getElementById("b-standalone"); if(bsa) bsa.onclick=()=>exportStandalone(f.id);
  const bem=document.getElementById("b-embed"); if(bem) bem.onclick=()=>showEmbed(f.id);
  const bp=document.getElementById("b-preview"); if(bp) bp.onclick=()=>startPlayer(f.id);
  const pub=document.getElementById("b-publish"); if(pub) pub.onclick=()=>{
    f.published=true; saveDB();
    showModal('<h3>Funnel veröffentlicht ✅</h3><p class="muted">Dein Funnel ist jetzt auf "live" gesetzt. In diesem Prototyp läuft er lokal in deinem Browser.</p>'
      +'<div class="field"><label>Teilbarer Vorschau-Link (lokal)</label><code class="dns">'+esc(location.href.split("#")[0])+'#funnel='+f.id+'</code></div>'
      +'<div class="notice">Für eine echte öffentliche URL: unter <b>Domains</b> steht, wie du in Netlify eine eigene Domain verbindest.</div>'
      +'<div class="actions"><button class="btn primary" data-close>Verstanden</button></div>');
    render();
  };

  // steps
  document.querySelectorAll("[data-step]").forEach(el=>{
    el.onclick=(e)=>{ if(e.target.closest(".si-actions")) return; UI.stepId=el.getAttribute("data-step"); UI.blockId=null; render(); };
  });
  document.querySelectorAll("[data-stepup]").forEach(b=>b.onclick=(e)=>{e.stopPropagation();moveStep(f,b.getAttribute("data-stepup"),-1);});
  document.querySelectorAll("[data-stepdown]").forEach(b=>b.onclick=(e)=>{e.stopPropagation();moveStep(f,b.getAttribute("data-stepdown"),1);});
  document.querySelectorAll("[data-stepdel]").forEach(b=>b.onclick=(e)=>{e.stopPropagation();
    if(f.steps.length<=1){ toast("Mindestens ein Schritt nötig"); return; }
    const id=b.getAttribute("data-stepdel");
    f.steps=f.steps.filter(s=>s.id!==id); if(UI.stepId===id) UI.stepId=f.steps[0].id; saveDB(); render();
  });
  const addStep=document.getElementById("add-step");
  if(addStep) addStep.onclick=()=>{ const s=newStep("Schritt "+(f.steps.length+1),[]); f.steps.push(s); UI.stepId=s.id; UI.blockId=null; saveDB(); render(); };

  // step drag reorder
  enableStepDrag(f);

  // step default next
  const sdn=document.getElementById("step-default-next");
  if(sdn&&step) sdn.onchange=()=>{ step.logic.defaultNext=sdn.value; saveDB(); render(); };
  const sse=document.getElementById("step-show-event");
  if(sse&&step) sse.onchange=()=>{ step.logic.showEvent=sse.value.trim(); saveDB(); };

  // block selection + delete + drag
  document.querySelectorAll("[data-block]").forEach(el=>{
    el.onclick=(e)=>{ if(e.target.closest("[data-blockdel]")) return; UI.blockId=parseInt(el.getAttribute("data-block")); render(); };
  });
  document.querySelectorAll("[data-blockdel]").forEach(b=>b.onclick=(e)=>{e.stopPropagation();
    const i=parseInt(b.getAttribute("data-blockdel")); step.blocks.splice(i,1); UI.blockId=null; saveDB(); render();
  });
  enableBlockDrag(f,step);
  enablePaletteDrag(f,step);

  bindProps(f,step);
}
function moveStep(f,id,dir){
  const i=f.steps.findIndex(s=>s.id===id); const j=i+dir;
  if(j<0||j>=f.steps.length) return;
  const t=f.steps[i]; f.steps[i]=f.steps[j]; f.steps[j]=t; saveDB(); render();
}
function enableStepDrag(f){
  let dragId=null;
  document.querySelectorAll("#steps-list [data-step]").forEach(el=>{
    el.addEventListener("dragstart",()=>{ dragId=el.getAttribute("data-step"); });
    el.addEventListener("dragover",e=>e.preventDefault());
    el.addEventListener("drop",e=>{ e.preventDefault();
      const targetId=el.getAttribute("data-step"); if(!dragId||dragId===targetId) return;
      const from=f.steps.findIndex(s=>s.id===dragId); const to=f.steps.findIndex(s=>s.id===targetId);
      const moved=f.steps.splice(from,1)[0]; f.steps.splice(to,0,moved); saveDB(); render();
    });
  });
}
function enableBlockDrag(f,step){
  let dragIdx=null;
  document.querySelectorAll("#canvas [data-block]").forEach(el=>{
    el.addEventListener("dragstart",e=>{ dragIdx=parseInt(el.getAttribute("data-block")); e.dataTransfer.setData("text/plain","block"); });
    el.addEventListener("dragover",e=>e.preventDefault());
    el.addEventListener("drop",e=>{ e.preventDefault(); e.stopPropagation();
      const palType=e.dataTransfer.getData("palette");
      const to=parseInt(el.getAttribute("data-block"));
      if(palType){ const nb=BLOCK_DEFS[palType].make(); step.blocks.splice(to,0,nb); UI.blockId=to; saveDB(); render(); return; }
      if(dragIdx==null||dragIdx===to) return;
      const moved=step.blocks.splice(dragIdx,1)[0]; step.blocks.splice(to,0,moved); UI.blockId=to; saveDB(); render();
    });
  });
}
function enablePaletteDrag(f,step){
  document.querySelectorAll("[data-pal]").forEach(el=>{
    el.addEventListener("dragstart",e=>{ e.dataTransfer.setData("palette",el.getAttribute("data-pal")); });
    el.addEventListener("click",()=>{ const nb=BLOCK_DEFS[el.getAttribute("data-pal")].make(); step.blocks.push(nb); UI.blockId=step.blocks.length-1; saveDB(); render(); });
  });
  const dz=document.getElementById("drop-zone");
  if(dz){
    dz.addEventListener("dragover",e=>e.preventDefault());
    dz.addEventListener("drop",e=>{
      const palType=e.dataTransfer.getData("palette");
      if(palType){ e.preventDefault(); const nb=BLOCK_DEFS[palType].make(); step.blocks.push(nb); UI.blockId=step.blocks.length-1; saveDB(); render(); }
    });
  }
}
function bindProps(f,step){
  const bl=getSelBlock(step); if(!bl) return;
  const v=(id)=>{ const e=document.getElementById(id); return e?e.value:null; };
  const on=(id,fn)=>{ const e=document.getElementById(id); if(e){ e.oninput=fn; e.onchange=fn; } };
  on("p-text",()=>{ bl.text=v("p-text"); liveCanvas(f,step); });
  on("p-q",()=>{ bl.question=v("p-q"); liveCanvas(f,step); });
  on("p-size",()=>{ bl.size=parseInt(v("p-size"))||20; liveCanvas(f,step); });
  on("p-align",()=>{ bl.align=v("p-align"); liveCanvas(f,step); });
  on("p-url",()=>{ bl.url=v("p-url"); liveCanvas(f,step); });
  on("p-alt",()=>{ bl.alt=v("p-alt"); });
  on("p-label",()=>{ if(bl.type==="form") bl.submitLabel=v("p-label"); else bl.label=v("p-label"); liveCanvas(f,step); });
  on("p-action",()=>{ bl.action=v("p-action"); });
  on("p-event",()=>{ bl.event=v("p-event"); saveDB(); });
  on("p-min",()=>{ bl.minutes=parseInt(v("p-min"))||1; liveCanvas(f,step); });
  on("p-height",()=>{ bl.height=parseInt(v("p-height"))||10; liveCanvas(f,step); });
  on("p-amount",()=>{ bl.amount=v("p-amount"); liveCanvas(f,step); });
  on("p-html",()=>{ bl.html=v("p-html"); liveCanvas(f,step); });
  on("p-items",()=>{ bl.items=v("p-items").split("\n").map(s=>s.trim()).filter(Boolean); liveCanvas(f,step); });
  on("p-faq",()=>{ bl.items=v("p-faq").split("\n").filter(Boolean).map(l=>{const p=l.split("|");return {q:(p[0]||"").trim(),a:(p[1]||"").trim()};}); liveCanvas(f,step); });
  on("p-tst",()=>{ bl.items=v("p-tst").split("\n").filter(Boolean).map(l=>{const p=l.split("|");return {text:(p[0]||"").trim(),name:(p[1]||"").trim()};}); liveCanvas(f,step); });
  on("p-res",()=>{ bl.tiers=v("p-res").split("\n").filter(Boolean).map(l=>{const p=l.split("|");return {min:parseInt(p[0])||0,title:(p[1]||"").trim(),text:(p[2]||"").trim()};}); liveCanvas(f,step); });
  on("p-mode",()=>{ bl.mode=v("p-mode"); saveDB(); render(); });
  on("p-enddate",()=>{ bl.endDate=v("p-enddate"); liveCanvas(f,step); });
  on("p-ficon",()=>{ bl.icon=v("p-ficon"); liveCanvas(f,step); });
  on("p-ftitle",()=>{ bl.title=v("p-ftitle"); liveCanvas(f,step); });
  on("p-ftext",()=>{ bl.text=v("p-ftext"); liveCanvas(f,step); });
  on("p-hbadge",()=>{ bl.badge=v("p-hbadge"); liveCanvas(f,step); });
  on("p-hh",()=>{ bl.headline=v("p-hh"); liveCanvas(f,step); });
  on("p-htext",()=>{ bl.text=v("p-htext"); liveCanvas(f,step); });
  on("p-hcta",()=>{ bl.cta=v("p-hcta"); liveCanvas(f,step); });
  on("p-himg",()=>{ bl.image=v("p-himg"); liveCanvas(f,step); });
  on("p-ktext",()=>{ bl.text=v("p-ktext"); liveCanvas(f,step); });
  const multi=document.getElementById("p-multi"); if(multi) multi.onchange=()=>{ bl.multi=multi.checked; saveDB(); };
  // choice options
  document.querySelectorAll("[data-opt]").forEach(el=>{
    el.oninput=()=>{ const i=+el.getAttribute("data-opt"),k=el.getAttribute("data-k");
      bl.options[i][k]= k==="points"?(parseInt(el.value)||0):el.value; if(k==="label") liveCanvas(f,step); saveDB(); };
  });
  document.querySelectorAll("[data-optnext]").forEach(el=>{
    el.onchange=()=>{ bl.options[+el.getAttribute("data-optnext")].next=el.value; saveDB(); };
  });
  document.querySelectorAll("[data-optdel]").forEach(b=>b.onclick=()=>{ bl.options.splice(+b.getAttribute("data-optdel"),1); saveDB(); render(); });
  const addOpt=document.getElementById("add-opt"); if(addOpt) addOpt.onclick=()=>{ bl.options.push({id:uid("o"),label:"Neue Option",points:1,next:"next"}); saveDB(); render(); };
  // form fields
  document.querySelectorAll("[data-ff]").forEach(el=>{
    const handler=()=>{ const i=+el.getAttribute("data-ff"),k=el.getAttribute("data-k");
      let val = el.type==="checkbox"?el.checked:el.value;
      bl.fields[i][k]=val;
      if(k==="label" && (!bl.fields[i].key || /^feld\d*$/.test(bl.fields[i].key))) bl.fields[i].key=val.toLowerCase().replace(/[^a-z0-9]+/g,"_").replace(/^_|_$/g,"")||("feld"+i);
      saveDB();
      if(k==="type"){ render(); return; }   // re-render so select-options appear
      liveCanvas(f,step); };
    el.oninput=handler; el.onchange=handler;
  });
  document.querySelectorAll("[data-ffdel]").forEach(b=>b.onclick=()=>{ bl.fields.splice(+b.getAttribute("data-ffdel"),1); saveDB(); render(); });
  const addField=document.getElementById("add-field"); if(addField) addField.onclick=()=>{ bl.fields.push({key:"feld"+bl.fields.length,label:"Neues Feld",type:"text",required:false}); saveDB(); render(); };
  const aiRw=document.getElementById("p-ai-rw"); if(aiRw) aiRw.onclick=()=>blockAI(bl,profileContext()+"Schreibe diesen deutschen Marketing-Text überzeugender, klarer und prägnanter um. Behalte die Sprache bei. Antworte NUR mit dem neuen Text:\n\n");
  const aiTr=document.getElementById("p-ai-tr"); if(aiTr) aiTr.onclick=()=>blockAI(bl,"Translate this text to English. Answer ONLY with the translation:\n\n");
}
function liveCanvas(f,step){
  saveDB();
  const c=document.getElementById("canvas");
  if(c) c.innerHTML=renderCanvas(f,step);
  // re-bind canvas interactions
  document.querySelectorAll("#canvas [data-block]").forEach(el=>{
    el.onclick=(e)=>{ if(e.target.closest("[data-blockdel]")) return; UI.blockId=parseInt(el.getAttribute("data-block")); render(); };
  });
  document.querySelectorAll("#canvas [data-blockdel]").forEach(b=>b.onclick=(e)=>{e.stopPropagation();
    step.blocks.splice(parseInt(b.getAttribute("data-blockdel")),1); UI.blockId=null; saveDB(); render();
  });
  enableBlockDrag(f,step);
  const dz=document.getElementById("drop-zone");
  if(dz){ dz.addEventListener("dragover",e=>e.preventDefault());
    dz.addEventListener("drop",e=>{ const palType=e.dataTransfer.getData("palette");
      if(palType){ e.preventDefault(); step.blocks.push(BLOCK_DEFS[palType].make()); UI.blockId=step.blocks.length-1; render(); } }); }
}

const PLAYER={ funnelId:null, stepIndex:0, score:0, answers:{}, points:{}, history:[], leadId:null, timers:[], visited:{}, fields:{}, utm:{}, device:"" };
function captureParams(){ const o={}; try{ new URLSearchParams(location.search).forEach((v,k)=>o[k]=v); }catch(e){} return o; }
function applyFunnelFont(f){ const fam=f.settings.fontFamily; if(!fam) return; const id="ff-font-"+fam.replace(/\W/g,"");
  if(!document.getElementById(id)){ const l=document.createElement("link"); l.id=id; l.rel="stylesheet";
    l.href="https://fonts.googleapis.com/css2?family="+encodeURIComponent(fam)+":wght@400;600;700;800&display=swap"; document.head.appendChild(l); } }
function startPlayer(funnelId){
  const f=getFunnel(funnelId); if(!f){ toast("Funnel nicht gefunden"); return; }
  if(f.type==="html"){ renderHtmlPlayer(f); return; }
  if(f.steps.length===0){ toast("Funnel hat keine Schritte"); return; }
  PLAYER.funnelId=funnelId; PLAYER.stepIndex=0; PLAYER.score=0; PLAYER.answers={}; PLAYER.points={}; PLAYER.history=[]; PLAYER.leadId=null; PLAYER.visited={};
  PLAYER.fields={}; PLAYER.utm=captureParams(); PLAYER.device=detectDevice();
  injectPixel(f); applyFunnelFont(f);
  track(funnelId,"start",{device:PLAYER.device,hour:new Date().getHours(),
    utm_source:PLAYER.utm.utm_source||"",utm_medium:PLAYER.utm.utm_medium||"",utm_campaign:PLAYER.utm.utm_campaign||""});
  pixelTrack(f,"ViewContent","view_content","ViewContent",{content_name:f.name,content_category:"funnel"});
  renderPlayer();
}
const PIXELS={ meta:new Set(), ga4:new Set(), tiktok:new Set() };
function injectPixel(f){
  const s=f.settings;
  // Meta Pixel — init per ID
  if(s.metaPixel && /^\d{6,20}$/.test(s.metaPixel) && !PIXELS.meta.has(s.metaPixel)){
    PIXELS.meta.add(s.metaPixel);
    if(!window.fbq){ (function(n,t){ const q=n.fbq=function(){ q.callMethod? q.callMethod.apply(q,arguments):q.queue.push(arguments); };
      if(!n._fbq) n._fbq=q; q.push=q; q.loaded=true; q.version="2.0"; q.queue=[];
      const e=t.createElement("script"); e.async=true; e.src="https://connect.facebook.net/en_US/fbevents.js";
      const x=t.getElementsByTagName("script")[0]; x.parentNode.insertBefore(e,x); })(window,document); }
    try{ window.fbq("init", s.metaPixel); window.fbq("track","PageView"); }catch(e){}
  }
  // Google Analytics 4 — actually inject gtag.js
  if(s.ga4 && /^G-[A-Z0-9]+$/i.test(s.ga4) && !PIXELS.ga4.has(s.ga4)){
    PIXELS.ga4.add(s.ga4);
    const sc=document.createElement("script"); sc.async=true; sc.src="https://www.googletagmanager.com/gtag/js?id="+encodeURIComponent(s.ga4); document.head.appendChild(sc);
    window.dataLayer=window.dataLayer||[]; if(!window.gtag) window.gtag=function(){ window.dataLayer.push(arguments); };
    window.gtag("js", new Date()); window.gtag("config", s.ga4);
  }
  // TikTok Pixel — inject ttq
  if(s.tiktok && /^[A-Z0-9]{10,30}$/i.test(s.tiktok) && !PIXELS.tiktok.has(s.tiktok)){
    PIXELS.tiktok.add(s.tiktok);
    (function(w,d,t){ w.TiktokAnalyticsObject=t; var ttq=w[t]=w[t]||[];
      ttq.methods=["page","track","identify","instances","debug","on","off","once","ready","alias","group","enableCookie","disableCookie"];
      ttq.setAndDefer=function(o,m){ o[m]=function(){ o.push([m].concat([].slice.call(arguments,0))); }; };
      for(var i=0;i<ttq.methods.length;i++) ttq.setAndDefer(ttq,ttq.methods[i]);
      ttq.load=function(id){ var u="https://analytics.tiktok.com/i18n/pixel/events.js"; ttq._i=ttq._i||{}; ttq._i[id]=[]; ttq._i[id]._u=u; ttq._t=ttq._t||{}; ttq._t[id]=+new Date(); ttq._o=ttq._o||{}; ttq._o[id]={};
        var a=d.createElement("script"); a.async=true; a.src=u+"?sdkid="+id; var m=d.getElementsByTagName("script")[0]; m.parentNode.insertBefore(a,m); };
      try{ ttq.load(s.tiktok); ttq.page(); }catch(e){} })(window,document,"ttq");
  }
}
/* unified event firing across Meta / GA4 / TikTok */
function pixelTrack(f, metaEvent, ga4Event, tiktokEvent, params){
  params=params||{}; const s=f.settings;
  if(s.metaPixel && window.fbq){ try{ window.fbq("track", metaEvent, params); }catch(e){} }
  if(s.ga4 && window.gtag){ try{ window.gtag("event", ga4Event, params); }catch(e){} }
  if(s.tiktok && window.ttq){ try{ window.ttq.track(tiktokEvent, params); }catch(e){} }
}
/* fire a CUSTOM event name (assigned to a button or a step) on all platforms */
function pixelTrackCustom(f, name){
  if(!name) return; const s=f.settings||{}; name=String(name).trim(); if(!name) return;
  if(s.metaPixel && window.fbq){ try{ window.fbq("trackCustom", name); }catch(e){} }
  if(s.ga4 && window.gtag){ try{ window.gtag("event", name.toLowerCase().replace(/[^a-z0-9]+/g,"_")); }catch(e){} }
  if(s.tiktok && window.ttq){ try{ window.ttq.track(name); }catch(e){} }
}

function renderPlayer(){
  const f=getFunnel(PLAYER.funnelId); const step=f.steps[PLAYER.stepIndex];
  (PLAYER.timers||[]).forEach(t=>clearInterval(t)); PLAYER.timers=[];
  // track view once per step per session
  if(!PLAYER.visited[step.id]){ PLAYER.visited[step.id]=true; track(f.id,"view",{step:step.id});
    if(step.logic&&step.logic.showEvent) pixelTrackCustom(f,step.logic.showEvent); }
  const c=f.settings.primaryColor||"#4f7cff";
  const progress=((PLAYER.stepIndex+1)/f.steps.length*100);
  const exp=f.settings.style==="express";
  let inner="";
  if(exp){ if(step.meta&&step.meta.qlabel) inner+='<div class="r-qbar" style="background:'+esc(c)+'">'+esc(step.meta.qlabel)+'</div>'; }
  else if(!(step.meta&&step.meta.hideProgress)) inner+='<div class="r-progress"><div style="width:'+progress+'%"></div></div>';
  step.blocks.forEach((bl,i)=>{ inner+='<div data-pi="'+i+'">'+renderPlayerBlock(bl,f)+'</div>'; });
  if(!f.settings.hideBranding) inner+='<div style="text-align:center;margin-top:18px;font-size:11px;color:#b3bccb">⚡ erstellt mit FunnelForge</div>';
  const fontStyle=f.settings.fontFamily?('font-family:\''+esc(f.settings.fontFamily)+'\',sans-serif'):'';

  const root=document.getElementById("player-root");
  root.innerHTML='<div class="player-overlay"><div class="player-bar">'
    +'<div class="flex center gap">'
    +(PLAYER.history.length?'<button class="btn sm" id="player-back">← Zurück</button>':'')

function bindPlayerStep(f,step){
  // duration timer
  const tEl=document.querySelector("#player-inner [data-timer]");
  if(tEl){ let total=parseInt(tEl.getAttribute("data-timer"))*60;
    PLAYER.timers.push(setInterval(()=>{ total--; if(total<0) return; tEl.textContent=pad2(Math.floor(total/60))+":"+pad2(total%60); },1000)); }
  // fixed-date countdown
  const dEl=document.querySelector("#player-inner [data-deadline]");
  if(dEl){ const deadline=new Date(dEl.getAttribute("data-deadline")).getTime();
    const tick=()=>{ const diff=deadline-Date.now(); if(isNaN(diff)){ dEl.textContent="—"; return; }
      if(diff<=0){ dEl.textContent="00:00:00"; return; }
      const d=Math.floor(diff/864e5), h=Math.floor(diff%864e5/36e5), m=Math.floor(diff%36e5/6e4), s=Math.floor(diff%6e4/1e3);
      dEl.textContent=(d>0?d+"T ":"")+pad2(h)+":"+pad2(m)+":"+pad2(s); };
    tick(); PLAYER.timers.push(setInterval(tick,1000)); }
  // payment buttons (open external checkout)
  document.querySelectorAll("#player-inner .play-pay").forEach(b=>b.onclick=()=>{
    pixelTrack(f,"InitiateCheckout","begin_checkout","InitiateCheckout",{content_name:f.name});
    track(f.id,"click",{step:step.id});
    const u=safeUrl(b.getAttribute("data-payurl")); if(u) window.open(u,"_blank","noopener,noreferrer"); });
  // buttons — resolved by block index (not label text)
  document.querySelectorAll("#player-inner .play-btn").forEach(btn=>{
    btn.onclick=()=>{ track(f.id,"click",{step:step.id});
      const wrap=btn.closest("[data-pi]"); const bl=wrap?step.blocks[parseInt(wrap.getAttribute("data-pi"))]:null;
      if(bl&&bl.event) pixelTrackCustom(f,bl.event);
      if(bl&&bl.type==="button"){
        if(bl.action==="url"){ const u=safeUrl(bl.url); if(u) window.open(u,"_blank","noopener,noreferrer"); return; }
        if(bl.action==="ics"){ downloadICS((f.meta&&f.meta.webinarTitle)||f.name,(f.meta&&f.meta.webinarDate)||"",60); return; }
        if(bl.action==="end"){ finishFunnel(f); return; }
      }
      gotoNext(f,step,step.logic.defaultNext); };
  });
  // single-choice
  document.querySelectorAll("#player-inner .play-choice").forEach(ch=>{
    ch.onclick=()=>{
      const choiceBlock=step.blocks.find(b=>b.type==="choice");
      track(f.id,"click",{step:step.id});
      if(choiceBlock && choiceBlock.multi){ ch.classList.toggle("picked"); return; }
      ch.classList.add("picked");
      PLAYER.points[step.id]=parseInt(ch.getAttribute("data-points"))||0; recomputeScore();
      PLAYER.answers[step.id]=ch.textContent;
      const next=ch.getAttribute("data-next");
      setTimeout(()=>gotoNext(f,step,next),180);
    };
  });
  // multi-choice next
  const mn=document.querySelector("#player-inner .play-multi-next");
  if(mn) mn.onclick=()=>{ const picked=[...document.querySelectorAll("#player-inner .play-choice.picked")];
    PLAYER.points[step.id]=picked.reduce((a,p)=>a+(parseInt(p.getAttribute("data-points"))||0),0); recomputeScore();
    PLAYER.answers[step.id]=picked.map(p=>p.textContent).join(", ");
    gotoNext(f,step,step.logic.defaultNext); };
  // form
  const form=document.querySelector("#player-inner .play-form");
  if(form){
    form.querySelectorAll("input,select,textarea").forEach(el=>{ if(!el.name) return;
      el.addEventListener("input",()=>{ PLAYER.fields[el.name]=el.value; const r=el.closest(".r-field")||el.closest(".r-consent"); if(r) r.classList.remove("err"); }); });
    form.onsubmit=(e)=>{ e.preventDefault();
      if(!validatePlayerForm(form)){ toast("Bitte fülle die markierten Felder korrekt aus"); return; }
      const data={}; new FormData(form).forEach((val,k)=>data[k]=val);
      const ccSel=form.querySelector(".cc-sel");
      if(ccSel){ const formBlock=step.blocks.find(b=>b.type==="form");
        const telField=formBlock&&formBlock.fields.find(x=>x.type==="tel");
        if(telField&&data[telField.key]) data[telField.key]=ccSel.value+" "+data[telField.key]; }
      Object.assign(PLAYER.fields, data);
      saveLead(f,step,data); gotoNext(f,step,step.logic.defaultNext); };
  }
}
function validatePlayerForm(form){
  let ok=true, first=null;
  form.querySelectorAll(".r-field,.r-consent").forEach(r=>r.classList.remove("err"));
  form.querySelectorAll("[required]").forEach(el=>{
    const row=el.closest(".r-field")||el.closest(".r-consent"); let bad=false;
    if(el.type==="checkbox") bad=!el.checked;
    else if(!String(el.value||"").trim()) bad=true;
    else if(el.type==="email" && !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(el.value)) bad=true;
    if(bad){ ok=false; if(row){ row.classList.add("err"); if(!first) first=row; } }
  });
  if(first&&first.scrollIntoView) first.scrollIntoView({block:"center",behavior:"smooth"});
  return ok;
}
function gotoNext(f,step,target){
  if(target==="end"){ finishFunnel(f); return; }
  let nextIndex;
  if(target==="next"){ nextIndex=PLAYER.stepIndex+1; }
  else { nextIndex=f.steps.findIndex(s=>s.id===target); }
  if(nextIndex<0 || nextIndex>=f.steps.length){ finishFunnel(f); return; }
  PLAYER.history.push(PLAYER.stepIndex);
  PLAYER.stepIndex=nextIndex; renderPlayer();
}
function finishFunnel(f){
  track(f.id,"complete",{score:PLAYER.score,device:PLAYER.device});
  pixelTrack(f,"CompleteRegistration","sign_up","CompleteRegistration",{content_name:f.name});
  if(f.settings.confetti!==false) confetti();
  const c=f.settings.primaryColor||"#4f7cff";
  document.getElementById("player-inner").innerHTML=
    '<div style="text-align:center;padding:34px 8px"><div style="font-size:50px">🎉</div>'
    +'<div class="r-headline" style="text-align:center">Geschafft – vielen Dank!</div>'
    +'<div class="r-text" style="text-align:center">Deine Angaben wurden übermittelt. Wir melden uns in Kürze bei dir.</div>'
    +'<button class="r-btn" style="background:'+esc(c)+'" id="pl-restart">Nochmal ansehen</button></div>';
  document.getElementById("pl-restart").onclick=()=>startPlayer(f.id);
}
function saveLead(f,step,data){
  const lead={ id:uid("ld"), funnelId:f.id, funnelName:f.name, data:data, score:PLAYER.score,
    answers:Object.assign({},PLAYER.answers), status:"new", utm:Object.assign({},PLAYER.utm), device:PLAYER.device, createdAt:now() };
  DB.leads.push(lead); PLAYER.leadId=lead.id;
  track(f.id,"lead",{step:step.id,leadId:lead.id,device:PLAYER.device,utm_source:PLAYER.utm.utm_source||""});
  if(f.settings.confetti!==false) confetti();
  pixelTrack(f,"Lead","generate_lead","SubmitForm",{content_name:f.name,value:0,currency:"EUR"});
  // webhook (only https)
  if(f.settings.webhook && /^https:\/\//i.test(f.settings.webhook)){
    try{ fetch(f.settings.webhook,{method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify(lead),mode:"no-cors"}); }catch(e){ console.warn("webhook failed",e); }
  }
}

function dropoffChart(fid,range){
  const f=getFunnel(fid); if(!f) return "Funnel nicht gefunden.";
  const ev=eventsFor(fid,range);
  const stepViews=f.steps.map(st=>({ name:st.name, views:ev.filter(e=>e.type==="view"&&e.step===st.id).length }));
  const max=Math.max(1,...stepViews.map(s=>s.views));
  let h="";
  stepViews.forEach((s,i)=>{
    const prev = i>0?stepViews[i-1].views:s.views;
    const drop = prev>0?(1-(s.views/prev)):0;
    h+='<div class="bar-row"><div class="bl">'+(i+1)+'. '+esc(s.name)+'</div>'
      +'<div class="bar-track"><div class="bar-fill" style="width:'+(s.views/max*100)+'%">'+s.views+'</div></div>'
      +'<div class="bv">'+(i>0?("−"+pct(drop)+" Drop"):"Einstieg")+'</div></div>';
  });
  return h||'<span class="muted">Keine Views im Zeitraum.</span>';
}
function timeSeriesChart(fid,range){
  const start = range==="all"? (DB.events.length?Math.min(...DB.events.map(e=>e.ts)):now()) : rangeStart(range);
  const days=[]; let d=new Date(start); d.setHours(0,0,0,0);
  const end=new Date(); end.setHours(0,0,0,0);
  while(d.getTime()<=end.getTime() && days.length<60){ days.push(d.getTime()); d=new Date(d.getTime()+864e5); }
  const ev=DB.events.filter(e=>(!fid||e.funnelId===fid));
  const series=days.map(day=>{ const next=day+864e5;
    return { day, starts:ev.filter(e=>e.type==="start"&&e.ts>=day&&e.ts<next).length,
             leads:ev.filter(e=>e.type==="lead"&&e.ts>=day&&e.ts<next).length }; });
  const max=Math.max(1,...series.map(s=>s.starts));
  const w=Math.max(series.length*40,300), h=160, pad=24;
  let bars="";
  series.forEach((s,i)=>{ const bh=(s.starts/max)*(h-pad*2);
    const x=pad+i*((w-pad*2)/Math.max(series.length,1));
    bars+='<rect x="'+x+'" y="'+(h-pad-bh)+'" width="'+Math.max(8,(w-pad*2)/series.length-8)+'" height="'+bh+'" rx="3" fill="url(#g)"></rect>';
    if(series.length<=14) bars+='<text x="'+(x+8)+'" y="'+(h-8)+'" font-size="9" fill="#9aa3b2">'+fmtDateShort(s.day)+'</text>';
  });
  return '<svg class="chart" viewBox="0 0 '+w+' '+h+'" width="100%" height="'+h+'">'
    +'<defs><linearGradient id="g" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#7c5cff"/><stop offset="1" stop-color="#4f7cff"/></linearGradient></defs>'
    +bars+'</svg><div class="muted" style="font-size:12px;margin-top:6px">Balken = Funnel-Starts pro Tag</div>';
}
function deviceSplit(fid,range){
  const ev=eventsFor(fid,range).filter(e=>e.type==="start");
  const m=ev.filter(e=>e.device==="mobile").length, d=ev.filter(e=>e.device==="desktop").length, tot=m+d;
  if(tot===0) return '<span class="muted">Keine Daten.</span>';
  const bar=(label,val)=>'<div class="bar-row"><div class="bl">'+label+'</div><div class="bar-track"><div class="bar-fill" style="width:'+(val/tot*100)+'%">'+val+'</div></div><div class="bv">'+pct(val/tot)+'</div></div>';
  return bar("📱 Mobil",m)+bar("💻 Desktop",d);
}
function utmSources(fid,range){
  const ev=eventsFor(fid,range).filter(e=>e.type==="start");
  const g={}; ev.forEach(e=>{ const s=e.utm_source||"(direkt)"; g[s]=(g[s]||0)+1; });
  const rows=Object.keys(g).sort((a,b)=>g[b]-g[a]).slice(0,6);
  if(rows.length===0) return '<span class="muted">Keine Daten.</span>';
  const max=Math.max(...rows.map(r=>g[r]));
  return rows.map(r=>'<div class="bar-row"><div class="bl">'+esc(r)+'</div><div class="bar-track"><div class="bar-fill" style="width:'+(g[r]/max*100)+'%">'+g[r]+'</div></div><div class="bv"></div></div>').join("");
}
function hourActivity(fid,range){
  const ev=eventsFor(fid,range).filter(e=>e.type==="start");
  const buckets=new Array(24).fill(0);
  ev.forEach(e=>{ let hh=e.hour; if(hh==null) hh=new Date(e.ts).getHours(); buckets[hh]=(buckets[hh]||0)+1; });
  const max=Math.max(1,...buckets);
  let bars="";
  for(let i=0;i<24;i++){ bars+='<div style="flex:1;display:flex;flex-direction:column;justify-content:flex-end"><div class="hb" style="height:'+(buckets[i]/max*100)+'%"></div>'+(i%3===0?'<div class="hl">'+i+'</div>':'<div class="hl">&nbsp;</div>')+'</div>'; }
  return '<div class="hbar">'+bars+'</div><div class="muted" style="font-size:11px;margin-top:4px">Stunde (0–23) · Funnel-Starts</div>';
}

function seedDemoData(){
  if(DB.funnels.length===0){ const f=TEMPLATES.quiz.build(); f.name="Demo Quiz-Funnel"; f.published=true; DB.funnels.push(f); }
  const names=["Anna","Max","Lena","Tom","Sara","Jonas","Mia","Paul","Lea","Finn","Emma","Noah"];
  DB.funnels.forEach(f=>{
    for(let day=29;day>=0;day--){
      const base=Date.now()-day*864e5;
      const sessions=2+Math.floor(Math.random()*8);
      for(let s=0;s<sessions;s++){
        const ts=base+Math.floor(Math.random()*864e5);
        const vis=uid("dvis");
        const dev=Math.random()<0.72?"mobile":"desktop";
        const src=["facebook","instagram","google","(direkt)","tiktok","linkedin"][Math.floor(Math.random()*6)];
        DB.events.push({id:uid("ev"),funnelId:f.id,type:"start",ts,visitor:vis,device:dev,hour:new Date(ts).getHours(),utm_source:src});
        let dropped=false;
        f.steps.forEach((st,idx)=>{
          if(dropped) return;
          DB.events.push({id:uid("ev"),funnelId:f.id,type:"view",ts:ts+idx*1000,visitor:vis,step:st.id});
          if(Math.random()<0.25 && idx>0){ dropped=true; return; }
          DB.events.push({id:uid("ev"),funnelId:f.id,type:"click",ts:ts+idx*1000+200,visitor:vis,step:st.id});
        });
        if(!dropped && Math.random()<0.5){
          const nm=names[Math.floor(Math.random()*names.length)];
          const lead={id:uid("ld"),funnelId:f.id,funnelName:f.name,data:{name:nm,email:nm.toLowerCase()+Math.floor(Math.random()*99)+"@mail.de"},score:Math.floor(Math.random()*6),answers:{},createdAt:ts+5000};
          DB.leads.push(lead);
          DB.events.push({id:uid("ev"),funnelId:f.id,type:"lead",ts:ts+5000,visitor:vis,step:f.steps[f.steps.length-1].id,leadId:lead.id});
          DB.events.push({id:uid("ev"),funnelId:f.id,type:"complete",ts:ts+6000,visitor:vis});
        }
      }
    }
  });
  saveDB(); render(); toast("Demo-Daten erzeugt");
}

function mergeCopy(ai, base){
  if(!ai||typeof ai!=="object") return base;
  const out=deepClone(base);
  const keys=["intro_headline","intro_sub","cta_label","benefits_headline","benefits_intro","benefits_cta","form_headline","form_intro","form_submit","thankyou_headline","thankyou_text"];
  keys.forEach(k=>{ if(typeof ai[k]==="string" && ai[k].trim()) out[k]=ai[k].trim(); });
  if(Array.isArray(ai.benefits) && ai.benefits.length) out.benefits=ai.benefits.map(String).slice(0,6);
  ["q_experience","q_start","q_pensum"].forEach(q=>{
    if(ai[q]&&typeof ai[q]==="object"){
      if(typeof ai[q].question==="string"&&ai[q].question.trim()) out[q].question=ai[q].question.trim();
      if(Array.isArray(ai[q].options)&&ai[q].options.length>=2) out[q].options=ai[q].options.map(String).slice(0,4);
    }
  });
  return out;
}

/* Build the funnel object from a copy schema */
function buildRecruitingFunnel(o, copy){
  const color=o.color||"#2563eb";
  const f=newFunnel((o.job||"Stelle")+" – "+(o.company||"Funnel"));
  f.settings.primaryColor=color;
  f.meta={ type:"recruiting", website:o.website||"", job:o.job||"", location:o.location||"", company:o.company||"" };

  const H=(t,size,align)=>{const b=BLOCK_DEFS.headline.make();b.text=t;if(size)b.size=size;if(align)b.align=align;return b;};
  const T=(t,align)=>{const b=BLOCK_DEFS.text.make();b.text=t;if(align)b.align=align;return b;};
  const IMG=(u)=>{const b=BLOCK_DEFS.image.make();b.url=u;b.alt=o.company||"Logo";return b;};
  const BTN=(label,action)=>{const b=BLOCK_DEFS.button.make();b.label=label;b.action=action||"next";return b;};
  const SP=(h)=>{const b=BLOCK_DEFS.spacer.make();b.height=h||16;return b;};
  const CHOICE=(q,opts)=>{const b=BLOCK_DEFS.choice.make();b.question=q;
    b.options=opts.map((label,i)=>({id:uid("o"),label,points:i+1,next:"next"}));return b;};

  // 1) Intro / Hero
  const intro=newStep("Start", []);
  if(o.logo) intro.blocks.push(IMG(o.logo));
  intro.blocks.push(H(copy.intro_headline,27,"center"));
  intro.blocks.push(T(copy.intro_sub,"center"));
  intro.blocks.push(SP(8));
  intro.blocks.push(BTN(copy.cta_label,"next"));

  // 2-4) Quiz qualification
  const qExp=newStep("Erfahrung",[CHOICE(copy.q_experience.question, copy.q_experience.options)]);
  const qStart=newStep("Startzeitpunkt",[CHOICE(copy.q_start.question, copy.q_start.options)]);
  const qPensum=newStep("Pensum",[CHOICE(copy.q_pensum.question, copy.q_pensum.options)]);

  // 5) Benefits
  const ben=newStep("Benefits",[]);

/* ---------- Branded image/banner generators (self-contained SVG) ---------- */
function _xmlEsc(s){ return String(s==null?"":s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }
function _svgUri(svg){ return "data:image/svg+xml,"+encodeURIComponent(svg).replace(/'/g,"%27"); }
function shade(hex,pct){
  hex=String(hex||"#4f7cff").replace("#",""); if(hex.length===3) hex=hex.split("").map(c=>c+c).join("");
  let r=parseInt(hex.substr(0,2),16)||0,g=parseInt(hex.substr(2,2),16)||0,b=parseInt(hex.substr(4,2),16)||0;
  const cl=v=>Math.max(0,Math.min(255,Math.round(v)));
  r=cl(r*(1+pct)); g=cl(g*(1+pct)); b=cl(b*(1+pct));
  return "#"+[r,g,b].map(v=>v.toString(16).padStart(2,"0")).join("");
}
function heroBanner(color){
  const l=shade(color,0.22), d=shade(color,-0.38);
  const svg='<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 360">'
    +'<defs><linearGradient id="hg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="'+l+'"/><stop offset="1" stop-color="'+d+'"/></linearGradient></defs>'
    +'<rect width="800" height="360" fill="url(#hg)"/>'
    +'<circle cx="650" cy="70" r="170" fill="#ffffff" opacity="0.09"/>'
    +'<circle cx="110" cy="330" r="190" fill="#ffffff" opacity="0.06"/>'
    +'<circle cx="710" cy="300" r="95" fill="#ffffff" opacity="0.08"/>'
    +'<path d="M0 300 Q200 250 400 300 T800 300 V360 H0 Z" fill="#000000" opacity="0.12"/>'
    +'</svg>';
  return _svgUri(svg);
}
function sectionBanner(color,label){
  const l=shade(color,0.10), d=shade(color,-0.30);
  const t=_xmlEsc(String(label||"").toUpperCase());
  const svg='<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 140">'
    +'<defs><linearGradient id="sg" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="'+d+'"/><stop offset="1" stop-color="'+l+'"/></linearGradient></defs>'
    +'<rect width="800" height="140" fill="url(#sg)"/>'

function mergeExpressCopy(ai, base){
  if(!ai||typeof ai!=="object") return base;
  const out=deepClone(base);
  ["hero_h1","hero_h2","hero_sub","vision_head","vision_close","benefits_intro","ty_text"].forEach(k=>{
    if(typeof ai[k]==="string"&&ai[k].trim()) out[k]=ai[k].trim(); });
  if(Array.isArray(ai.vision_lines)&&ai.vision_lines.length) out.vision_lines=ai.vision_lines.map(String).slice(0,5);
  if(Array.isArray(ai.benefits)&&ai.benefits.length){
    out.benefits=ai.benefits.slice(0,8).map((b,i)=>({
      icon:(b&&b.icon)||out.benefits[i%out.benefits.length].icon,
      title:(b&&b.title)?String(b.title):out.benefits[i%out.benefits.length].title,
      text:(b&&b.text)?String(b.text):out.benefits[i%out.benefits.length].text }));
  }
  if(ai.testimonial1&&typeof ai.testimonial1==="object"){
    if(ai.testimonial1.text) out.testimonial1.text=String(ai.testimonial1.text);
    if(ai.testimonial1.name) out.testimonial1.name=String(ai.testimonial1.name);
    if(ai.testimonial1.role) out.testimonial1.role=String(ai.testimonial1.role);
  }
  ["q1","q2","q3","q4"].forEach(q=>{ if(ai[q]&&typeof ai[q]==="object"){
    if(ai[q].question) out[q].question=String(ai[q].question);
    if(Array.isArray(ai[q].options)&&ai[q].options.length>=2)
      out[q].options=ai[q].options.map(s=>/^👉/.test(s)?String(s):("👉  "+s)).slice(0,4); } });
  return out;
}
async function aiRewriteExpress(o){
  const prompt=buildExpressAIPrompt(o);
  const d=await anthropicJSON({model:"claude-haiku-4-5-20251001",max_tokens:2200,messages:[{role:"user",content:prompt}]});
  let text=aiTextFromResp(d);
  text=text.replace(/^```(json)?/i,"").replace(/```$/,"").trim();
  return JSON.parse(text);
}

const HTMLEDIT={ visual:false };
async function aiHtml(system, user){
  // Lange Generierung → Streaming-Funktion (hält Verbindung offen, kein 504).
  const res=await fetch("/.netlify/functions/ai-stream",{method:"POST",headers:{"content-type":"application/json"},body:JSON.stringify({model:"claude-haiku-4-5-20251001",max_tokens:6000,system:system,messages:[{role:"user",content:user}]})});
  if(!res.ok || !res.body){
    if(res.status===404) throw new Error("Streaming-Funktion noch nicht da – kurz warten & nochmal (Deploy).");
    let ex=""; try{ ex=(await res.text()).slice(0,140); }catch(e){}
    throw new Error("KI nicht erreichbar ("+res.status+") "+ex);
  }
  const reader=res.body.getReader(); const dec=new TextDecoder(); let buf="", text="";
  while(true){
    const {done,value}=await reader.read(); if(done) break;
    buf+=dec.decode(value,{stream:true});
    let nl;
    while((nl=buf.indexOf("\n"))>=0){
      const line=buf.slice(0,nl).trim(); buf=buf.slice(nl+1);
      if(line.startsWith("data:")){
        const d=line.slice(5).trim();
        if(d && d!=="[DONE]"){ try{ const ev=JSON.parse(d); if(ev.type==="content_block_delta" && ev.delta && ev.delta.text) text+=ev.delta.text; }catch(e){} }
      }
    }
  }
  text=text.trim().replace(/^```html\s*/i,"").replace(/^```\s*/,"").replace(/```\s*$/,"").trim();
  const m=text.match(/<!DOCTYPE[\s\S]*<\/html>/i)||text.match(/<html[\s\S]*<\/html>/i);
  return m?m[0]:text;
}

/* Business-Profil des Nutzers (aus LearningSuite) als KI-Kontext */
function profileContext(){
  const p=(typeof DB!=="undefined"&&DB.profile)||{};
  const bits=[];
  if(p.dienstleistung) bits.push("Dienstleistung/Angebot: "+p.dienstleistung);
  if(p.methode) bits.push("Methode/Vorgehen: "+p.methode);
  if(p.zielgruppe) bits.push("Zielgruppe/Branche: "+p.zielgruppe);
  if(p.angebot) bits.push("Kernversprechen/Angebotssatz: "+p.angebot);
  if(!bits.length) return "";
  return "\nKontext zum Business des Nutzers (fuer relevanten, personalisierten Output nutzen, nicht woertlich wiederholen):\n- "+bits.join("\n- ")+"\n";
}
function profileOfferDraft(){
  const p=(typeof DB!=="undefined"&&DB.profile)||{};
  if(!(p.dienstleistung||p.angebot||p.zielgruppe)) return "";
  let s="";
  if(p.dienstleistung) s+="Ich biete "+p.dienstleistung;
  if(p.zielgruppe) s+=" fuer "+p.zielgruppe;
  s=s.trim(); if(s) s+=". ";
  if(p.angebot) s+=p.angebot+(/[.!?]$/.test(String(p.angebot).trim())?" ":". ");
  if(p.methode) s+="Vorgehen: "+p.methode+".";
  return s.trim();
}

function bindHtmlBuilder(f){
  const frame=document.getElementById("html-edit-frame"); if(!frame) return;
  function saveFromFrame(){ try{ const doc=frame.contentDocument; if(doc&&doc.documentElement){ f.html="<!DOCTYPE html>\n"+doc.documentElement.outerHTML; saveDB(); } }catch(e){} }
  function renderSectionList(){ const box=document.getElementById("html-sections"); if(!box) return; let doc; try{ doc=frame.contentDocument; }catch(e){ box.innerHTML=""; return; } if(!doc||!doc.body){ box.innerHTML=""; return; }
    const secs=[...doc.body.children].filter(n=>n.tagName!=="SCRIPT");
    box.innerHTML = secs.length? secs.map((s,i)=>{ const txt=(s.textContent||"").trim().replace(/\s+/g," ").slice(0,26); const label=(s.id||s.className||s.tagName.toLowerCase())+(txt?(" · "+txt):"");
      return '<div class="opt-row" style="gap:4px"><span style="flex:1;font-size:11.5px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="'+esc(label)+'">'+esc(label)+'</span><button class="icon-btn" data-su="'+i+'" title="hoch">↑</button><button class="icon-btn" data-sd="'+i+'" title="runter">↓</button><button class="icon-btn" data-sx="'+i+'" title="löschen">✕</button></div>'; }).join("") : '<div class="muted" style="font-size:12px">Keine Abschnitte erkannt.</div>';
    box.querySelectorAll("[data-su]").forEach(b=>b.onclick=()=>{ const i=+b.getAttribute("data-su"); if(i>0){ secs[i].parentNode.insertBefore(secs[i],secs[i-1]); saveFromFrame(); renderSectionList(); } });
    box.querySelectorAll("[data-sd]").forEach(b=>b.onclick=()=>{ const i=+b.getAttribute("data-sd"); if(i<secs.length-1){ secs[i].parentNode.insertBefore(secs[i+1],secs[i]); saveFromFrame(); renderSectionList(); } });
    box.querySelectorAll("[data-sx]").forEach(b=>b.onclick=()=>{ const i=+b.getAttribute("data-sx"); secs[i].remove(); saveFromFrame(); renderSectionList(); });
  }
  frame.addEventListener("load",()=>{ try{ const doc=frame.contentDocument; if(doc) doc.designMode=HTMLEDIT.visual?"on":"off"; }catch(e){} renderSectionList(); });
  frame.srcdoc = f.html || "<!DOCTYPE html><html><body style='font-family:sans-serif;padding:40px;text-align:center'><h1>Leere Seite</h1></body></html>";
  const nm=document.getElementById("fn-name"); if(nm) nm.onchange=()=>{ f.name=nm.value.trim()||"KI-Seite"; saveDB(); };
  const bs=document.getElementById("b-settings"); if(bs) bs.onclick=()=>openFunnelSettings(f.id);
  const bp=document.getElementById("b-preview"); if(bp) bp.onclick=()=>{ saveFromFrame(); startPlayer(f.id); };
  const bsa=document.getElementById("b-standalone"); if(bsa) bsa.onclick=()=>{ saveFromFrame(); exportStandalone(f.id); };
  const pub=document.getElementById("b-publish"); if(pub) pub.onclick=()=>{ saveFromFrame(); f.published=true; saveDB(); toast("Veröffentlicht ✓"); render(); };
  const vis=document.getElementById("html-visual"); if(vis) vis.onchange=()=>{ HTMLEDIT.visual=vis.checked; try{ frame.contentDocument.designMode=HTMLEDIT.visual?"on":"off"; }catch(e){} };
  const sv=document.getElementById("html-save"); if(sv) sv.onclick=()=>{ saveFromFrame(); toast("Gespeichert ✓"); };
  const go=document.getElementById("html-ai-go"), stt=document.getElementById("html-ai-status");
  if(go) go.onclick=async ()=>{ const instr=(document.getElementById("html-ai").value||"").trim();
    if(!instr){ stt.textContent="Bitte Änderung beschreiben."; return; }
    saveFromFrame(); go.disabled=true; stt.textContent="KI arbeitet…";
    try{ const html=await aiHtml(htmlDesignSystem((f.meta&&f.meta.style)||"bold"), "Hier ist die aktuelle Landeseite:\n\n"+f.html+"\n\nGewünschte Änderung: "+instr+"\n\nGib die KOMPLETTE, aktualisierte HTML-Seite zurück (nur HTML, von <!DOCTYPE html> bis </html>).");
      if(html&&/<\/html>/i.test(html)){ f.html=html; saveDB(); frame.srcdoc=html; document.getElementById("html-ai").value=""; stt.innerHTML='<span style="color:var(--good)">Angepasst ✓</span>'; }
      else stt.innerHTML='<span style="color:var(--bad)">KI-Antwort unbrauchbar – nochmal.</span>'; }
    catch(e){ stt.innerHTML='<span style="color:var(--bad)">KI-Fehler: '+esc(e.message)+'</span>'; }
    go.disabled=false; };
}

function showModal(html){
  document.getElementById("modal-root").innerHTML='<div class="overlay" id="overlay"><div class="modal">'+html+'</div></div>';
  document.querySelectorAll("[data-close]").forEach(b=>b.onclick=closeModal);
  document.getElementById("overlay").addEventListener("mousedown",e=>{ if(e.target.id==="overlay") closeModal(); });
}
function closeModal(){ document.getElementById("modal-root").innerHTML=""; }
function confirmModal(title,msg,onYes){
  showModal('<h3>'+esc(title)+'</h3><p class="muted">'+esc(msg)+'</p>'
    +'<div class="actions"><button class="btn ghost" data-close>Abbrechen</button><button class="btn danger" id="cf-yes">Ja, fortfahren</button></div>');
  document.getElementById("cf-yes").onclick=()=>{ closeModal(); onYes(); };
}

/* ============================================================
   GLOBAL bindings after each render (help/reset)
   ============================================================ */
const _origRender=render;
function afterRender(){
  document.querySelectorAll("[data-oneshot]").forEach(b=>b.onclick=openOneShotModal);
  document.querySelectorAll("[data-oneshot-webinar]").forEach(b=>b.onclick=openWebinarModal);
  const imp=document.getElementById("import-funnel"); if(imp) imp.onclick=importFunnelDialog;
  const reset=document.getElementById("reset-all");
  if(reset) reset.onclick=()=>confirmModal("Wirklich alles zurücksetzen?","Alle Funnels, Leads und Tracking-Daten werden gelöscht.",()=>{
    DB={funnels:[],leads:[],events:[],domains:[]}; saveDB(); UI.view="dashboard"; render(); toast("Zurückgesetzt");
  });
}

/* wrap render to always run afterRender */
function renderWrapped(){ _origRender(); afterRender(); }
window.render = renderWrapped;
render = renderWrapped;

/* ============================================================
   DEEP LINK (#funnel=ID opens player)
   ============================================================ */
function checkHash(){
  const m=location.hash.match(/funnel=([\w]+)/);
  if(!m) return;
  if(getFunnel(m[1])) startPlayer(m[1]);
  else toast("Funnel nicht gefunden – Vorschau-Links funktionieren nur im Erstell-Browser. Für öffentliches Teilen: Standalone-Export nutzen.");
}

/* ============================================================
   INIT
   ============================================================ */
render();
checkHash();
window.addEventListener("hashchange", checkHash);
/* load this user's data from Supabase, then refresh the view */
if(REMOTE){ supaLoad().then(loaded=>{ if(loaded) render(); }); }
</script>
